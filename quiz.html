<div class="container mt-5 d-flex justify-content-center align-items-center vh-100" class="quizcontainer">
    <div class="card shadow p-4" style="width:600px; ">
        <h4 id="question">Kérdés helye</h4>

        <div id="answers" class="mt-3"></div>

        <button id="nextBtn" class="btn btn-primary mt-3">
            Következő
        </button>

        <div id="result" class="mt-3 fw-bold"></div>
    </div>
</div>

<script>
const questions = [
    {
        question: "Mikor jött létre a Supercell?",
        answers: ["2011.08.24", "2010.05.14", "2009.09.07", "2011.12.03"],
        correct: 2
    },
    {
        question: "Kik alapították?",
        answers: ["Mikko Kodisoja és Ikka Paananen", "Niko Derome és Visa Forstén", "Petri Styrman és Lassi Leppinen", "A Zynga alapítói"],
        correct: 2
    },
    {
        question: "Hány kiadatlan játékuk volt?",
        answers: ["8", "11", "9", "10"],
        correct: 3
    },
    {
        question: "Melyik volt az első nemzetközileg megjelent játékuk?",
        answers: ["Pets vs Orcs", "Clash of Clans", "Boom Beach", "Hay Day"],
        correct: 4
    },
    {
        question: "Milyen fajta játék volt a Clash of Clans?",
        answers: ["Mezőgazdaság szimuláció", "Stratégiai bázis építő", "Felsőnézetes lövöldözős", "Free for All csapatépítő"],
        correct: 2
    }
];

let currentIndex = 0;
let score = 0;

function loadQuestion() {
    const q = questions[currentIndex];
    document.getElementById("question").textContent = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        answersDiv.innerHTML += `
            <div class="form-check">
                <input class="form-check-input" type="radio" name="answer" value="${index}">
                <label class="form-check-label">${answer}</label>
            </div>
        `;
    });
}

document.getElementById("nextBtn").addEventListener("click", function() {

    const selected = document.querySelector('input[name="answer"]:checked');

    if (!selected) {
        alert("Válassz egy választ!");
        return;
    }

    if (parseInt(selected.value) === questions[currentIndex].correct) {
        score++;
    }

    currentIndex++;

    if (currentIndex < questions.length) {
        loadQuestion();
    } else {
        document.querySelector(".card").innerHTML = `
            <h3>Kvíz vége!</h3>
            <p>Pontszám: ${score} / ${questions.length}</p>
            <button class="btn btn-success mt-3" onclick="location.reload()">
                Újraindítás
            </button>
        `;
    }
});

loadQuestion();
</script>

</body>
