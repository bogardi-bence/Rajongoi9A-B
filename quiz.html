  <link rel="stylesheet" href="style.css">

</head>
<body>

  <img src="supercell logo4.png" title="Supercell logó" alt="Supercell logó" class="logo">

          class="navbar-toggler"

          <span class="navbar-toggler-icon"></span>
        </button>

          class="collapse navbar-collapse justify-content-center"

<div class="container d-flex justify-content-center align-items-center" style="padding: 120px 0;">
    <div class="card shadow p-4 quizcontainer bg-dark text-white">
        <h4 id="question">Kérdés helye</h4>

        <div id="answers" class="mt-3"></div>

        <button id="nextBtn" class="btn btn-primary mt-3 ">
            Következő
        </button>

        <div id="result" class="mt-3 fw-bold"></div>
    </div>
</div>

<script>
const questions = [
    {
        question: "Mikor jött létre a Supercell?",
        answers: ["2011.08.24", "2010.05.14", "2009.09.07", "2011.12.03"],
        correct: 1
    },
    {
        question: "Kik alapították?",
        answers: ["Mikko Kodisoja és Ikka Paananen", "Niko Derome és Visa Forstén", "Petri Styrman és Lassi Leppinen", "A Zynga alapítói"],
        correct: 0
    },
    {
        question: "Melyik városban alapították a Supercellt?",
        answers: ["Helsinki", "Turku", "Espoo", "Tampere"],
        correct: 2
    },
    {
        question: "Melyik cégnél dolgoztak együtt az alapítók 2000-től?",
        answers: ["Zynga", "Sumea", "Rovio", "EA"],
        correct: 1
    },
    {
        question: "Miért hagyta el a Supercell a Gunshine.net fejlesztését?",
        answers: ["Fizetős lett a játék", "Kevés karakter volt benne", "Nem kötötte le sokáig a játékosokat és nehéz volt", "Túl sok negatív visszajelzést kaptak"],
        correct: 2
    },
    {
        question: "Melyik volt az első nemzetközileg megjelent játékuk?",
        answers: ["Pets vs Orcs", "Clash of Clans", "Boom Beach", "Hay Day"],
        correct: 3
    },
    {
        question: "Melyik játék fejlesztését hagyták abba?",
        answers: ["Pets vs Orcs", "Hay Day", "Boom Beach", "Squad Busters"],
        correct: 0
    },
    {
        question: "Milyen fajta játék volt a Clash of Clans?",
        answers: ["Mezőgazdaság szimuláció", "Stratégiai bázis építő", "Felsőnézetes lövöldözős", "Free for All csapatépítő"],
        correct: 1
    },
    {
        question: "Melyik játék jelent meg 2016.03.02.-án?",
        answers: ["Boom Beach", "Brawl Stars", "Squad Busters", "Clash Royale"],
        correct: 3
    },
    {
        question: "Melyik játék érte el a Clash of Clans szintű sikert?",
        answers: ["Boom Beach", "Clash Royale", "Hay Day", "Squad Busters"],
        correct: 1
    },
    {
        question: "Melyik játék volt 2013-ban a negyedik legtöbbet termelő mobiljáték?",
        answers: ["Clash of Clans", "Hay Day", "Boom Beach", "Brawl Stars"],
        correct: 1
    },
    {
        question: "Melyik játékban harcolnak a játékosok felső nézetből, csapatokban?",
        answers: ["Clash of Clans", "Hay Day", "Brawl Stars", "Clash Royale"],
        correct: 2
    },
    {
        question: "Melyik játék használ karaktereket több Supercell játékból?",
        answers: ["Squad Busters", "Boom Beach", "Brawl Stars", "Clash of Clans"],
        correct: 0
    },
    {
        question: "Melyik játéknak van modern katonai kinézete?",
        answers: ["Clash of Clans", "Squad Busters", "Brawl Stars", "Boom Beach"],
        correct: 3
    },
    {
        question: "Hány kiadatlan játékuk volt?",
        answers: ["8", "11", "9", "10"],
        correct: 2
    }
];

let currentIndex = 0;
let score = 0;
let wrongAnswers = [];

function loadQuestion() {
    const q = questions[currentIndex];
    document.getElementById("question").textContent = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((answer, index) => {
        answersDiv.innerHTML += `
            <div class="form-check text-start">
                <input class="form-check-input" type="radio" name="answer" value="${index}" id="a${index}">
                <label class="form-check-label" for="a${index}">${answer}</label>
            </div>
        `;
    });
}

document.getElementById("nextBtn").addEventListener("click", function() {

    const selected = document.querySelector('input[name="answer"]:checked');

    if (!selected) {
        alert("Válassz egy választ!");
        return;
    }

    const selectedValue = parseInt(selected.value);
    const q = questions[currentIndex];

    if (selectedValue === q.correct) {
        score++;
    } else {
        wrongAnswers.push({
            question: q.question,
            your: q.answers[selectedValue],
            correct: q.answers[q.correct]
        });
    }

    currentIndex++;

    if (currentIndex < questions.length) {
        loadQuestion(); 
    } else {

        let answersHTML = "";

        if (wrongAnswers.length > 0) {
            answersHTML += "<h5 class='mt-4'>Hibás válaszaid:</h5>";

            wrongAnswers.forEach(item => {
                answersHTML += `
                    <div class="mt-3 text-start">
                        <b>${item.question}</b><br>
                        ❌ Te válaszod: ${item.your}<br>
                        ✅ Helyes válasz: <span class="text-success">${item.correct}</span>
                    </div>
                `;
            });
        } else {
            answersHTML = "<p class='mt-3 text-success'>Minden válasz helyes volt! 🎉</p>";
        }

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = `
            <h3 class="quizh3">Kvíz vége!</h3>
            <p>Pontszám: ${score} / ${questions.length}</p>
            ${answersHTML}
            <button class="btn btn-success mt-3" onclick="location.reload()">Újraindítás</button>
        `;

        document.getElementById("question").style.display = "none";
        document.getElementById("answers").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
    }
});

loadQuestion();
</script>

</body>
</html>
